syntax = "proto3";

package message;

message GetVerifyReq {
  string email = 1;
}

message GetVerifyRsp {
  int32 error = 1;
  string email = 2;
  string code = 3;
}

service VerifyService {
  rpc GetVerifyCode(GetVerifyReq) returns (GetVerifyRsp) {}
}

message GetChatServerReq {
  int32 uid = 1;
}

message GetChatServerRsp {
  int32 error = 1;
  string host = 2;
  string port = 3;
  string token = 4;
  string server_id = 5;
  string grpc_port = 6;
}

message LoginReq {
  int32 uid = 1;
  string token = 2;
}

message LoginRsp {
  int32 error = 1;
  int32 uid = 2;
  string token = 3;
}

message RegisterChatServerReq {
  string server_id = 1;
  string host = 2;
  string port = 3;
  string grpc_port = 4;
}

message RegisterChatServerRsp {
  int32 error = 1;
}

message HeartbeatReq {
  string server_id = 1;
  string host = 2;
  string port = 3;
  int64 timestamp = 4;
  string grpc_port = 5;
}

message HeartbeatRsp {
  int32 error = 1;
  bool online = 2;
}

message ReportUserOnlineReq {
  int32 uid = 1;
  string token = 2;
  string server_id = 3;
  string host = 4;
  string port = 5;
}

message ReportUserOnlineRsp {
  int32 error = 1;
}

message ReportUserOfflineReq {
  int32 uid = 1;
  string server_id = 2;
}

message ReportUserOfflineRsp {
  int32 error = 1;
}

message QueryUserRouteReq {
  int32 uid = 1;
}

message QueryUserRouteRsp {
  int32 error = 1;
  bool online = 2;
  string server_id = 3;
  string host = 4;
  string port = 5;
  string grpc_port = 6;
}

message PushFriendRequestsReq {
  int32 uid = 1;
}

message PushFriendRequestsRsp {
  int32 error = 1;
  bool delivered = 2;
}

service StatusService {
  rpc GetChatServer(GetChatServerReq) returns (GetChatServerRsp) {}
  rpc Login(LoginReq) returns (LoginRsp) {}
  rpc RegisterChatServer(RegisterChatServerReq) returns (RegisterChatServerRsp) {}
  rpc Heartbeat(HeartbeatReq) returns (HeartbeatRsp) {}
  rpc ReportUserOnline(ReportUserOnlineReq) returns (ReportUserOnlineRsp) {}
  rpc ReportUserOffline(ReportUserOfflineReq) returns (ReportUserOfflineRsp) {}
  rpc QueryUserRoute(QueryUserRouteReq) returns (QueryUserRouteRsp) {}
}

service ChatService {
  rpc PushFriendRequests(PushFriendRequestsReq) returns (PushFriendRequestsRsp) {}
}
